<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category — Hearthpick</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.cat-hero{padding:calc(var(--nav-height) + 4rem) 0 3.5rem}
.cat-hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.cat-hero-visual{aspect-ratio:4/3;border-radius:4px;display:flex;align-items:center;justify-content:center}
.products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;margin-top:2.5rem}
@media(max-width:900px){.cat-hero-inner{grid-template-columns:1fr}.products-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.products-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="nav-mount"></div>
<section class="cat-hero" id="cat-hero-section" style="background:var(--ivory)">
  <div class="container">
    <nav class="breadcrumb"><a href="../index.html">Home</a><span class="breadcrumb-sep">›</span><a href="shop.html">Shop</a><span class="breadcrumb-sep">›</span><span id="bc-name">Category</span></nav>
    <div class="cat-hero-inner">
      <div>
        <div class="tag-label" id="cat-tag">Room</div>
        <h1 id="cat-title" style="font-family:var(--font-display);font-size:clamp(2.5rem,4vw,3.5rem);font-weight:400;margin:1rem 0">Category</h1>
        <p id="cat-desc" style="font-size:0.95rem;font-weight:300;color:var(--warm-gray);line-height:1.8;max-width:420px"></p>
      </div>
      <div class="cat-hero-visual" id="cat-visual"></div>
    </div>
  </div>
</section>
<section style="padding:4rem 0 6rem;background:var(--linen)">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <span id="prod-count" style="font-size:0.85rem;color:var(--warm-gray)"></span>
      <select class="sort-select" id="sort-select" onchange="renderProducts()" style="background:white;border:1px solid var(--ivory-dark);padding:0.5rem 0.75rem;font-size:0.82rem;font-family:var(--font-body);color:var(--charcoal);outline:none;border-radius:4px;cursor:pointer">
        <option value="newest">Newest First</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
      </select>
    </div>
    <div class="products-grid" id="products-grid"></div>
  </div>
</section>
<div id="nl-mount"></div>
<div id="footer-mount"></div>
<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script>
document.getElementById('nav-mount').innerHTML = Components.renderNav('shop');
document.getElementById('nl-mount').innerHTML = Components.renderNewsletter();
document.getElementById('footer-mount').innerHTML = Components.renderFooter('../');
Components.initNav();
const catId = new URLSearchParams(location.search).get('id');
const cat = HP.getCategories().find(c => c.id === catId);
if(cat){
  document.title = cat.name+' Finds — Hearthpick';
  document.getElementById('bc-name').textContent = cat.name;
  document.getElementById('cat-tag').textContent = 'Shop '+cat.name;
  document.getElementById('cat-title').innerHTML = cat.name+'<br><em style="font-style:italic;color:var(--terra)">Finds</em>';
  document.getElementById('cat-desc').textContent = cat.description;
  document.getElementById('cat-visual').style.background = cat.color;
  document.getElementById('cat-visual').innerHTML = '<span style="font-family:\'Playfair Display\',serif;font-size:2rem;font-style:italic;color:rgba(255,255,255,0.35)">'+cat.name+'</span>';
  document.getElementById('cat-hero-section').style.background = cat.color+'22';
}
function renderProducts(){
  let prods = HP.getProducts({status:'published',category:catId});
  const sort = document.getElementById('sort-select').value;
  if(sort==='price-asc') prods.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc') prods.sort((a,b)=>b.price-a.price);
  else prods.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  document.getElementById('prod-count').textContent = prods.length+' find'+(prods.length!==1?'s':'')+' in '+(cat?cat.name:'this category');
  document.getElementById('products-grid').innerHTML = prods.length
    ? prods.map((p,i)=>Components.renderProductCard(p,i,'../')).join('')
    : '<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--warm-gray);font-family:var(--font-display);font-style:italic">No finds in this category yet.</div>';
}
renderProducts();
</script>
</body>
</html>
